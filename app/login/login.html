<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLink - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="logo">
                FIT LINK
            </div>
            
            <div class="login-form">
                <h1 class="login-title">Log In</h1>
                
                <form>
                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-input" placeholder="Random@gmail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-group">
                            <input type="password" class="form-input" placeholder="Eg: 12345678" id="password" required>
                            <span class="password-toggle" onclick="togglePassword()">👁️</span>
                        </div>
                        <div class="forgot-password">
                            <a href="#">Forgot Your Password ?</a>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">log in</button>
                </form>
                
                <div class="divider">
                    <span>Or Continue With</span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn google-btn">G</button>
                    <button class="social-btn apple-btn">🍎</button>
                    <button class="social-btn facebook-btn">f</button>
                </div>
                
                <div class="signup-link">
                    Don't have an account ? <a href="../signup/signup.html">sign up</a>
                </div>
            </div>
        </div>
        
        <div class="right-section">
            <img src="../images/Frame 40.png" alt="Fitness motivation">
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggleIcon = document.querySelector('.password-toggle');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordField.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Add some interactive effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentNode.style.transform = 'translateY(-2px)';
            });
            
            input.addEventListener('blur', function() {
                this.parentNode.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>
</html>
