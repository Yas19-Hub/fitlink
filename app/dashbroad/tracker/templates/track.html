<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="../static/track.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">FitTracker</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/tracker" class="active">Tracker</a></li>
                <li><a href="/find-gym">Find Gym</a></li>
                <li><a href="/exercise">Exercise</a></li>
                <li><a href="/nutrition">Nutrition</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Fitness Tracker</h1>
        
        <!-- Quick Stats Dashboard -->
        <section class="stats-dashboard">
            <div class="stat-card">
                <h3>Today's Steps</h3>
                <span class="stat-number" id="todaySteps">0</span>
            </div>
            <div class="stat-card">
                <h3>Calories Burned</h3>
                <span class="stat-number" id="caloriesBurned">0</span>
            </div>
            <div class="stat-card">
                <h3>Workout Time</h3>
                <span class="stat-number" id="workoutTime">0 min</span>
            </div>
            <div class="stat-card">
                <h3>Water Intake</h3>
                <span class="stat-number" id="waterIntake">0L</span>
            </div>
        </section>

        <!-- Activity Logging -->
        <section class="activity-section">
            <h2>Log Activity</h2>
            <form id="activityForm" class="activity-form">
                <div class="form-group">
                    <label for="activityType">Activity Type:</label>
                    <select id="activityType" required>
                        <option value="">Select Activity</option>
                        <option value="running">Running</option>
                        <option value="walking">Walking</option>
                        <option value="cycling">Cycling</option>
                        <option value="swimming">Swimming</option>
                        <option value="weightlifting">Weight Lifting</option>
                        <option value="yoga">Yoga</option>
                        <option value="cardio">Cardio</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="duration">Duration (minutes):</label>
                    <input type="number" id="duration" min="1" required>
                </div>
                <div class="form-group">
                    <label for="intensity">Intensity:</label>
                    <select id="intensity" required>
                        <option value="">Select Intensity</option>
                        <option value="low">Low</option>
                        <option value="moderate">Moderate</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notes">Notes (optional):</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary">Log Activity</button>
            </form>
        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
            <h2>Quick Actions</h2>
            <div class="action-buttons">
                <button class="action-btn" onclick="addWater()">Add Water (250ml)</button>
                <button class="action-btn" onclick="addSteps()">Add Steps (1000)</button>
                <button class="action-btn" onclick="startWorkout()">Start Workout</button>
                <button class="action-btn" onclick="endWorkout()">End Workout</button>
            </div>
        </section>

        <!-- Activity History -->
        <section class="history-section">
            <h2>Today's Activities</h2>
            <div id="activityList" class="activity-list">
                <!-- Activities will be loaded here -->
            </div>
        </section>

        <!-- Progress Charts -->
        <section class="charts-section">
            <h2>Weekly Progress</h2>
            <div class="chart-container">
                <canvas id="progressChart" width="400" height="200"></canvas>
            </div>
        </section>
    </main>

    <script src="../static/track.js"></script>
</body>
</html>
